      const s = sizes[size] || sizes.md;
      const fg = white ? '#ffffff' : COLORS.green700;

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: s.icon, height: s.icon, background: white ? 'rgba(255,255,255,0.15)' : COLORS.green100, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `2px solid ${white ? 'rgba(255,255,255,0.3)' : COLORS.green200}` }}>

    const Button = ({ children, variant = 'primary', size = 'md', onClick, disabled, icon, style = {}, fullWidth = false }) => {
      const [hovered, setHovered] = React.useState(false);
      const base = {
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        border: 'none', cursor: disabled ? 'not-allowed' : 'pointer', borderRadius: 10,
        fontFamily: 'Outfit, sans-serif', fontWeight: 600, transition: 'all 0.15s ease',
        opacity: disabled ? 0.5 : 1, width: fullWidth ? '100%' : undefined, ...style,
      };
      const sizes = {
        sm: { padding: '7px 14px', fontSize: 13 },
        md: { padding: '11px 20px', fontSize: 15 },
        lg: { padding: '14px 28px', fontSize: 16 },
      };
      const variants = {
        primary: { background: hovered ? COLORS.green600 : COLORS.green700, color: '#fff' },
        secondary: { background: hovered ? COLORS.green50 : COLORS.green100, color: COLORS.green700, border: `1.5px solid ${COLORS.green200}` },
        outline: { background: hovered ? COLORS.green50 : 'transparent', color: COLORS.green700, border: `1.5px solid ${COLORS.green200}` },
        ghost: { background: hovered ? COLORS.green50 : 'transparent', color: COLORS.green700 },
        danger: { background: hovered ? 'oklch(48% 0.18 25)' : COLORS.danger, color: '#fff' },
        white: { background: hovered ? COLORS.green50 : '#fff', color: COLORS.green700 },
      };
      return (
        <button style={{ ...base, ...sizes[size], ...variants[variant] }} onClick={onClick} disabled={disabled}
          onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
          {icon && <Icon name={icon} size={16} color="currentColor" />}
          {children}
        </button>
      );
    };

    const Card = ({ children, style = {}, padding = 24, onClick, hover = false }) => {
      const [hovered, setHovered] = React.useState(false);
      return (
        <div style={{ background: COLORS.surface, borderRadius: 16, border: `1.5px solid ${hovered && hover ? COLORS.green200 : COLORS.border}`, padding, boxShadow: hovered && hover ? '0 4px 20px rgba(0,80,0,0.08)' : '0 1px 4px rgba(0,0,0,0.04)', transition: 'all 0.15s', cursor: onClick ? 'pointer' : 'default', ...style }}
          onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
          {children}
        </div>
      );
    };

    const Input = ({ label, type = 'text', value, onChange, placeholder, required, icon, hint, error }) => {
      const [focused, setFocused] = React.useState(false);
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {label && <label style={{ fontFamily: 'Outfit', fontSize: 13, fontWeight: 600, color: COLORS.textSecondary, letterSpacing: '0.01em' }}>{label}{required && <span style={{ color: COLORS.danger }}> *</span>}</label>}

                <Icon name="map" size={14} color="rgba(255,255,255,0.9)" />
                <span style={{ color: 'rgba(255,255,255,0.9)', fontSize: 13, fontWeight: 500 }}>Serving Nsasa Estate, Mukono District, Kampala</span>

                  <div style={{ width: 44, height: 44, borderRadius: 12, background: COLORS.green100, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16 }}>
                    <Icon name={s.icon} size={22} color={COLORS.green600} />

                  <div style={{ color: COLORS.textSecondary, fontSize: 14, lineHeight: 1.6 }}>{s.desc}</div>

          <section style={{ background: COLORS.green50, padding: '72px 24px' }}>

                  </div>
                  <Icon name="chevronRight" size={18} color={COLORS.textMuted} />
                </div>
              </Card>
              <Card padding={20} hover onClick={() => onNavigate('agreement')}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: COLORS.green100, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <Icon name="doc" size={20} color={COLORS.green600} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>Service Agreement</div>
                    <div style={{ fontSize: 13, color: COLORS.textMuted }}>Review your contract terms</div>
                  </div>
                  <Icon name="chevronRight" size={18} color={COLORS.textMuted} />
                </div>
              </Card>
              <Card padding={20} style={{ background: COLORS.green50, border: `1.5px solid ${COLORS.green200}` }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.green800, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Icon name="bell" size={15} color={COLORS.green600} /> Reminder
                </div>
                <div style={{ fontSize: 13, color: COLORS.textSecondary, lineHeight: 1.5 }}>
                  Monthly payment of <strong>UGX 25,000</strong> is due by <strong>10 May 2026</strong>.<br />Pay via Mobile Money or Bank Transfer.
                </div>
                <div style={{ marginTop: 12, fontSize: 12, color: COLORS.textMuted }}>Bank of Africa · 06566780001</div>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const Collections = () => {
      const all = [...MOCK_COLLECTIONS, ...Array(4).fill(null).map((_, i) => ({ date: `2026-0${3-Math.floor(i/2)}-${(18 - i*7).toString().padStart(2,'0')}`, status: 'completed', notes: `Collected ${i+1} bag${i>0?'s':''}` }))];

      return (
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.02em' }}>Collections</h1>
          <p style={{ margin: '0 0 28px', color: COLORS.textMuted, fontSize: 15 }}>Your full collection schedule and history</p>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 14, marginBottom: 28 }}>
            {[['Completed', all.filter(c=>c.status==='completed').length, 'green'], ['Scheduled', all.filter(c=>c.status==='scheduled').length, 'blue'], ['Missed', all.filter(c=>c.status==='missed').length, 'red']].map(([l, v, c]) => (
              <Card key={l} padding={18} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 32, fontWeight: 800, color: c === 'green' ? COLORS.green600 : c === 'red' ? COLORS.danger : 'oklch(50% 0.14 240)' }}>{v}</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted, fontWeight: 600 }}>{l}</div>
              </Card>
            ))}
          </div>

          <Card padding={0}>
            <div style={{ padding: '18px 22px', borderBottom: `1px solid ${COLORS.border}`, fontWeight: 700, fontSize: 16 }}>Collection Log</div>
            {all.map((c, i) => {
              const cfg = { completed: { label: 'Collected', color: 'green', icon: 'check' }, scheduled: { label: 'Upcoming', color: 'blue', icon: 'calendar' }, missed: { label: 'Missed', color: 'red', icon: 'alert' } }[c.status];
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '14px 22px', borderBottom: i < all.length - 1 ? `1px solid ${COLORS.border}` : 'none' }}>
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: cfg.color === 'green' ? COLORS.green100 : cfg.color === 'red' ? 'oklch(94% 0.04 25)' : 'oklch(93% 0.06 240)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <Icon name={cfg.icon} size={16} color={cfg.color === 'green' ? COLORS.green600 : cfg.color === 'red' ? COLORS.danger : 'oklch(46% 0.14 240)'} strokeWidth={2.2} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14, color: COLORS.textPrimary }}>{formatDate(c.date)}</div>
                    {c.notes && <div style={{ fontSize: 12, color: COLORS.textMuted }}>{c.notes}</div>}
                  </div>
                  <Badge color={cfg.color} dot>{cfg.label}</Badge>
                </div>
              );
            })}
          </Card>
        </div>
      );
    };

    const Invoices = () => {
      const [selected, setSelected] = React.useState(null);
      const inv = selected ? MOCK_INVOICES.find(i => i.id === selected) : null;

      if (inv) return (
        <div>
          <button onClick={() => setSelected(null)} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', cursor: 'pointer', color: COLORS.textSecondary, fontFamily: 'Outfit', fontSize: 14, marginBottom: 24, padding: 0 }}>
            <Icon name="chevronLeft" size={18} /> Back to Invoices
          </button>
          <Card padding={36} style={{ maxWidth: 600 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 32, flexWrap: 'wrap', gap: 16 }}>
              <Logo size="md" />
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.textPrimary }}>{inv.id}</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 2 }}>{formatDate(inv.date)}</div>
                <div style={{ marginTop: 8 }}><Badge color={inv.status === 'paid' ? 'green' : 'yellow'} dot>{inv.status === 'paid' ? 'Paid' : 'Pending'}</Badge></div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 28 }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: COLORS.textMuted, marginBottom: 4 }}>Billed To</div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{inv.client}</div>
                <div style={{ fontSize: 14, color: COLORS.textSecondary }}>{inv.address}</div>
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: COLORS.textMuted, marginBottom: 4 }}>Service Provider</div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>Reusable Resources</div>
                <div style={{ fontSize: 14, color: COLORS.textSecondary }}>Wankata Village, Mukono</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted }}>0778527802</div>
              </div>
            </div>
            <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 20 }}>
              <thead>
                <tr style={{ borderBottom: `2px solid ${COLORS.border}` }}>
                  {['Description','Qty','Unit Price','Amount'].map(h => <th key={h} style={{ padding: '8px 0', fontSize: 12, fontWeight: 700, color: COLORS.textMuted, textAlign: h === 'Description' ? 'left' : 'right', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                  <td style={{ padding: '14px 0', fontSize: 14, fontWeight: 600 }}>Garbage Collection ({inv.plan})</td>
                  <td style={{ padding: '14px 0', fontSize: 14, textAlign: 'right' }}>{inv.qty}</td>
                  <td style={{ padding: '14px 0', fontSize: 14, textAlign: 'right' }}>{formatUGX(inv.unitPrice)}</td>
                  <td style={{ padding: '14px 0', fontSize: 14, fontWeight: 600, textAlign: 'right' }}>{formatUGX(inv.subtotal)}</td>
                </tr>
              </tbody>
            </table>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end', marginBottom: 28 }}>
              <div style={{ display: 'flex', gap: 48, fontSize: 14 }}><span style={{ color: COLORS.textMuted }}>Subtotal</span><span>{formatUGX(inv.subtotal)}</span></div>
              <div style={{ display: 'flex', gap: 48, fontSize: 14 }}><span style={{ color: COLORS.textMuted }}>Tax (6%)</span><span>{formatUGX(inv.tax)}</span></div>
              <div style={{ display: 'flex', gap: 48, fontSize: 16, fontWeight: 800, paddingTop: 8, borderTop: `2px solid ${COLORS.border}`, width: '100%', justifyContent: 'flex-end' }}><span>Total</span><span style={{ color: COLORS.green700 }}>{formatUGX(inv.total)}</span></div>
            </div>
            <div style={{ background: COLORS.green50, borderRadius: 12, padding: '14px 16px' }}>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: COLORS.textMuted, marginBottom: 8 }}>Payment Details</div>
              <div style={{ fontSize: 13, color: COLORS.textSecondary, display: 'flex', flexDirection: 'column', gap: 3 }}>
                <div><strong>Bank:</strong> Bank of Africa · Mukono Countryside Mixed Farm Ltd · A/C 06566780001</div>
                <div><strong>Mobile Money:</strong> 0778527802 / 0704132691</div>
              </div>
            </div>
            <div style={{ marginTop: 20 }}><Button variant="outline" icon="download" size="sm">Download PDF</Button></div>
          </Card>
        </div>
      );

      return (
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.02em' }}>Invoices</h1>
          <p style={{ margin: '0 0 28px', color: COLORS.textMuted, fontSize: 15 }}>Your payment history and receipts</p>
          <Card padding={0}>
            <div style={{ padding: '18px 22px', borderBottom: `1px solid ${COLORS.border}`, fontWeight: 700, fontSize: 16 }}>All Invoices</div>
            {MOCK_INVOICES.map((inv, i) => (
              <div key={inv.id} onClick={() => setSelected(inv.id)} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '16px 22px', borderBottom: i < MOCK_INVOICES.length - 1 ? `1px solid ${COLORS.border}` : 'none', cursor: 'pointer', transition: 'background 0.12s' }}
                onMouseEnter={e => e.currentTarget.style.background = COLORS.green50}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: COLORS.green100, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name="invoice" size={18} color={COLORS.green600} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{inv.id}</div>
                  <div style={{ fontSize: 13, color: COLORS.textMuted }}>{formatDate(inv.date)} · {inv.plan} Plan</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: COLORS.textPrimary }}>{formatUGX(inv.total)}</div>
                  <Badge color={inv.status === 'paid' ? 'green' : 'yellow'} dot>{inv.status === 'paid' ? 'Paid' : 'Pending'}</Badge>
                </div>
                <Icon name="chevronRight" size={18} color={COLORS.textMuted} />
              </div>
            ))}
          </Card>
        </div>
      );
    };

    const Agreement = () => {
      const sections = [
        { title: '1. Scope of Services', body: `The Service Provider shall provide municipal/household waste collection and transportation services from the Client's premises. Services include the removal of domestic organic waste, plastics, glass, paper and other domestic/household waste.\n\nExclusions: This contract does not cover construction debris, hazardous chemicals, or medical waste unless specifically agreed upon in writing.` },
        { title: '2. Collection Schedule & Equipment', body: `Frequency: Collection shall occur once per week on specified days.\n\nContainers/bags: The Client shall use approved 50L or 100L bins and bags or heavy-duty sacks. The Service Provider will provide colour-coded waste bin bags to facilitate waste separation and sorting. Bins may be provided on request at an additional cost.\n\nPlacement: Bins/bags must be placed at the designated "collection point" (usually the gate or roadside) by 8:00 AM on the scheduled day of collection.` },
        { title: '3. Fees and Payment Terms', body: `The Client shall pay a monthly fee of UGX 25,000 per month (UGX 300,000 annually, paid monthly) or a discounted rate of UGX 240,000 paid once for an annual fee (equivalent to UGX 20,000 per month).\n\nPayments are due by the 10th day of each month. Payments shall be made via Mobile Money, Bank Transfer, or Cash with a valid receipt.\n\nFailure to pay for 3 consecutive months will result in immediate suspension of services.` },
        { title: '4. Obligations of the Parties', body: `The Client shall ensure waste is properly sorted (where required) using provided garbage bins/bags or as guided. They are also to ensure safe storage to prevent littering by stray animals, and that waste bags/bins are accessible on collection days.\n\nThe Service Provider shall ensure all collected waste is transported and disposed of at their waste handling site or as directed by government to an authorised dumpsite or recycling facility (Katikolo in Mukono, Buyala in Kampala or any other designated facility).` },
        { title: '5. Duration and Termination', body: `This agreement shall remain in force for a period of 5 years (60 months), renewable upon mutual consent.\n\nEither party may terminate this agreement by giving 3 months (90 days) written notice.` },
        { title: '6. Governing Law', body: `This agreement shall be governed by and construed in accordance with the Laws of Uganda, including the National Environment (Waste Management) Regulations and local government ordinances.` },
      ];

      return (
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.02em' }}>Service Agreement</h1>
          <p style={{ margin: '0 0 28px', color: COLORS.textMuted, fontSize: 15 }}>Household Garbage Collection — Terms & Conditions</p>
          <Card padding={32} style={{ maxWidth: 700 }}>
            <div style={{ textAlign: 'center', paddingBottom: 28, borderBottom: `2px solid ${COLORS.border}`, marginBottom: 28 }}>
              <div style={{ display: 'flex', justifyContent: 'center' }}><Logo size="md" /></div>
              <div style={{ marginTop: 12, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                Wankata Village, Nakisunga Sub-county · P.O. Box 151132, Kampala<br />
                0778527802 / 0704132691 · briantwesigye@gmail.com
              </div>
              <div style={{ marginTop: 16, fontWeight: 800, fontSize: 18, color: COLORS.textPrimary, textTransform: 'uppercase', letterSpacing: '0.02em' }}>Service Agreement for Household Garbage Collection</div>
            </div>

            <div style={{ background: COLORS.green50, border: `1.5px solid ${COLORS.green200}`, borderRadius: 12, padding: '14px 18px', marginBottom: 28, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <Icon name="check" size={16} color={COLORS.green600} strokeWidth={2.5} />
              <div style={{ fontSize: 14, color: COLORS.textSecondary, lineHeight: 1.6 }}>
                <strong style={{ color: COLORS.green700 }}>Your agreement is active.</strong> Signed for client <strong>{client.name}</strong>, {client.address}. Valid for 5 years from commencement.
              </div>
            </div>

            {sections.map(s => (
              <div key={s.title} style={{ marginBottom: 24 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: COLORS.green800, marginBottom: 8 }}>{s.title}</div>
                {s.body.split('\n\n').map((para, i) => (
                  <p key={i} style={{ margin: '0 0 8px', fontSize: 14, color: COLORS.textSecondary, lineHeight: 1.7 }}>{para}</p>
                ))}
              </div>
            ))}

            <div style={{ borderTop: `2px solid ${COLORS.border}`, paddingTop: 20, marginTop: 8 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, fontSize: 14 }}>
                <div>
                  <div style={{ fontWeight: 700, marginBottom: 6 }}>For the Service Provider:</div>
                  <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 8, color: COLORS.textMuted }}>Brian Twesigye · RERU</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, marginBottom: 6 }}>For the Client:</div>
                  <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 8, color: COLORS.textMuted }}>{client.name}</div>
                </div>
              </div>
            </div>
          </Card>
        </div>
      );
    };

    // ─── APP ROOT + NAVIGATION TOOLBAR ─────────────────────────────────────────
    const App = () => {
      const [page, setPage] = React.useState(() => localStorage.getItem('reru_page') || 'home');
      const [authMode, setAuthMode] = React.useState('login');
      const [tweakOpen, setTweakOpen] = React.useState(false);

      const navigate = (p) => {
        if (p === 'login' || p === 'register') { setAuthMode(p); setPage('auth'); localStorage.setItem('reru_page', 'auth'); }
        else { setPage(p); localStorage.setItem('reru_page', p); }
        window.scrollTo(0, 0);
      };

      const appPages = ['dashboard','collections','invoices','agreement'];
      const inApp = appPages.includes(page);

      const content = (() => {
        if (page === 'home') return <LandingPage onNavigate={navigate} />;
        if (page === 'auth') return <AuthScreen onNavigate={navigate} mode={authMode} />;
        if (inApp) return (
          <AppShell page={page} onNavigate={navigate}>
            {page === 'dashboard' && <Dashboard onNavigate={navigate} />}
            {page === 'collections' && <Collections />}
            {page === 'invoices' && <Invoices />}
            {page === 'agreement' && <Agreement />}
          </AppShell>
        );
        return <LandingPage onNavigate={navigate} />;
      })();

      return (
        <>
          {content}

          {!tweakOpen && (
            <button onClick={() => setTweakOpen(true)} title="Navigate between screens"
              style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9998, width: 44, height: 44, borderRadius: '50%', background: COLORS.green700, color: '#fff', border: 'none', cursor: 'pointer', boxShadow: '0 6px 20px rgba(0,80,0,0.24)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="settings" size={18} color="#fff" />
            </button>
          )}

          {tweakOpen && (
            <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: '#fff', borderRadius: 16, boxShadow: '0 8px 40px rgba(0,0,0,0.16)', border: `1.5px solid ${COLORS.border}`, padding: 20, width: 280, fontFamily: 'Outfit' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: COLORS.textPrimary }}>Navigate</div>
                <button onClick={() => setTweakOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: COLORS.textMuted }}><Icon name="x" size={18} /></button>
              </div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.07em' }}>Go to screen</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {[['home','Home'],['auth','Login'],['dashboard','Dashboard'],['collections','Collections'],['invoices','Invoices'],['agreement','Agreement']].map(([p,l]) => (
                    <button key={p} onClick={() => navigate(p)} style={{ padding: '5px 11px', borderRadius: 8, border: `1.5px solid ${page === p ? COLORS.green600 : COLORS.border}`, background: page === p ? COLORS.green100 : '#fff', color: page === p ? COLORS.green700 : COLORS.textSecondary, fontFamily: 'Outfit', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>{l}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

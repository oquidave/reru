<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:oklch(97% 0.01 145);padding:20px;display:flex;flex-direction:column;gap:16px}
.label{font-size:11px;font-weight:700;color:oklch(62% 0.03 145);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button{font-family:'Outfit',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-weight:600;transition:all 0.15s ease;border:none}
svg{flex-shrink:0}
</style>
</head>
<body>

<div class="label">Primary</div>
<div class="row">
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:7px 14px;font-size:13px">Small</button>
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:11px 20px;font-size:15px">Medium</button>
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:14px 28px;font-size:16px">Large</button>
  <button style="background:oklch(46% 0.15 145);color:#fff;padding:11px 20px;font-size:15px">Hover state</button>
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:11px 20px;font-size:15px;opacity:0.5;cursor:not-allowed">Disabled</button>
</div>

<div class="label">Secondary / Outline / Ghost</div>
<div class="row">
  <button style="background:oklch(92% 0.06 145);color:oklch(38% 0.13 145);border:1.5px solid oklch(82% 0.10 145);padding:11px 20px;font-size:15px">Secondary</button>
  <button style="background:transparent;color:oklch(38% 0.13 145);border:1.5px solid oklch(82% 0.10 145);padding:11px 20px;font-size:15px">Outline</button>
  <button style="background:oklch(96% 0.03 145);color:oklch(38% 0.13 145);border:1.5px solid oklch(82% 0.10 145);padding:11px 20px;font-size:15px">Outline hover</button>
  <button style="background:transparent;color:oklch(38% 0.13 145);padding:11px 20px;font-size:15px">Ghost</button>
  <button style="background:oklch(96% 0.03 145);color:oklch(38% 0.13 145);padding:11px 20px;font-size:15px">Ghost hover</button>
</div>

<div class="label">White / Danger</div>
<div class="row">
  <div style="background:oklch(38% 0.13 145);padding:12px;border-radius:12px;display:flex;gap:10px">
    <button style="background:#fff;color:oklch(38% 0.13 145);padding:11px 20px;font-size:15px">White</button>
    <button style="background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:11px 20px;font-size:15px">Outline on dark</button>
  </div>
  <button style="background:oklch(52% 0.18 25);color:#fff;padding:11px 20px;font-size:15px">Danger</button>
</div>

<div class="label">With Icon</div>
<div class="row">
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:11px 20px;font-size:15px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Register Your Home
  </button>
  <button style="background:transparent;color:oklch(38% 0.13 145);border:1.5px solid oklch(82% 0.10 145);padding:9px 16px;font-size:13px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
</div>

<div class="label">Full-width</div>
<div style="max-width:320px">
  <button style="background:oklch(38% 0.13 145);color:#fff;padding:14px 28px;font-size:16px;width:100%;justify-content:center">Get Started</button>
</div>
</body></html>

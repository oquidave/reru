<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:oklch(97% 0.01 145);padding:24px;display:flex;flex-direction:column;gap:20px}
.label{font-size:11px;font-weight:700;color:oklch(62% 0.03 145);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="label">Logo — Sizes</div>
<div class="row" style="align-items:flex-end">
  <!-- Small -->
  <div style="display:flex;align-items:center;gap:9px">
    <div style="width:28px;height:28px;border-radius:6px;background:oklch(92% 0.06 145);border:2px solid oklch(82% 0.10 145);display:flex;align-items:center;justify-content:center">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="oklch(38% 0.13 145)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
    </div>
    <div><div style="font-weight:800;font-size:13px;line-height:1;color:oklch(28% 0.10 145);letter-spacing:-0.02em">REUSABLE</div><div style="font-weight:800;font-size:13px;line-height:1.15;color:oklch(28% 0.10 145);letter-spacing:-0.02em">RESOURCES <span style="font-weight:400;font-size:9px;color:oklch(54% 0.16 145)">RERU</span></div></div>
  </div>
  <!-- Medium -->
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:36px;height:36px;border-radius:8px;background:oklch(92% 0.06 145);border:2px solid oklch(82% 0.10 145);display:flex;align-items:center;justify-content:center">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="oklch(38% 0.13 145)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
    </div>
    <div><div style="font-weight:800;font-size:17px;line-height:1;color:oklch(28% 0.10 145);letter-spacing:-0.02em">REUSABLE</div><div style="font-weight:800;font-size:17px;line-height:1.1;color:oklch(28% 0.10 145);letter-spacing:-0.02em">RESOURCES <span style="font-weight:400;font-size:12px;color:oklch(54% 0.16 145)">RERU</span></div></div>
  </div>
  <!-- Large -->
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:48px;height:48px;border-radius:10px;background:oklch(92% 0.06 145);border:2px solid oklch(82% 0.10 145);display:flex;align-items:center;justify-content:center">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="oklch(38% 0.13 145)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
    </div>
    <div><div style="font-weight:800;font-size:22px;line-height:1;color:oklch(28% 0.10 145);letter-spacing:-0.02em">REUSABLE</div><div style="font-weight:800;font-size:22px;line-height:1.1;color:oklch(28% 0.10 145);letter-spacing:-0.02em">RESOURCES <span style="font-weight:400;font-size:16px;color:oklch(54% 0.16 145)">RERU</span></div></div>
  </div>
</div>

<div class="label">Logo — On Dark</div>
<div style="background:oklch(28% 0.10 145);border-radius:16px;padding:20px 24px;display:flex;gap:24px;flex-wrap:wrap;align-items:center">
  <!-- Small on dark -->
  <div style="display:flex;align-items:center;gap:9px">
    <div style="width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
    </div>
    <div><div style="font-weight:800;font-size:13px;line-height:1;color:#fff;letter-spacing:-0.02em">REUSABLE</div><div style="font-weight:800;font-size:13px;line-height:1.15;color:#fff;letter-spacing:-0.02em">RESOURCES <span style="font-weight:400;font-size:9px;color:rgba(255,255,255,0.55)">RERU</span></div></div>
  </div>
  <!-- Medium on dark -->
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
    </div>
    <div><div style="font-weight:800;font-size:17px;line-height:1;color:#fff;letter-spacing:-0.02em">REUSABLE</div><div style="font-weight:800;font-size:17px;line-height:1.1;color:#fff;letter-spacing:-0.02em">RESOURCES <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.55)">RERU</span></div></div>
  </div>
</div>

<div class="label">Logo — Icon Only</div>
<div class="row">
  <div style="width:32px;height:32px;border-radius:8px;background:oklch(92% 0.06 145);border:1.5px solid oklch(82% 0.10 145);display:flex;align-items:center;justify-content:center">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="oklch(38% 0.13 145)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
  </div>
  <div style="width:40px;height:40px;border-radius:10px;background:oklch(38% 0.13 145);display:flex;align-items:center;justify-content:center">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 19H4.5a2.5 2.5 0 010-5H12"/><path d="M17 19h2.5a2.5 2.5 0 000-5H12"/><path d="M12 5v9"/><path d="M9 8l3-3 3 3"/></svg>
  </div>
  <div style="font-size:12px;color:oklch(62% 0.03 145);line-height:1.5">Logo is typographic — Outfit 800 weight.<br/>Icon is Lucide <code>recycle</code> in a rounded well.<br/>No rasterised logo file — recreate in CSS/SVG.</div>
</div>
</body></html>
